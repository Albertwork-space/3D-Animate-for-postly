<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tampilan 3D Tas</title>
    <style>
        body {
            background: #f7f7f7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            font-family: sans-serif;
        }
        
        .scene {
            width: 300px;
            height: 300px;
            perspective: 1000px;
        }
        
        .cube {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            animation: spin 12s infinite linear;
        }
        
        .cube img {
            position: absolute;
            width: 300px;
            height: 300px;
            object-fit: cover;
            backface-visibility: hidden;
        }
        /* Depan */
        
        .front {
            transform: translateZ(150px);
        }
        /* Belakang (mirror depan) */
        
        .back {
            transform: rotateY(180deg) translateZ(150px);
        }
        /* Kanan */
        
        .right {
            transform: rotateY(90deg) translateZ(150px);
        }
        /* Kiri (mirror kanan) */
        
        .left {
            transform: rotateY(-90deg) translateZ(150px);
        }
        
        @keyframes spin {
            0% {
                transform: rotateY(0deg);
            }
            100% {
                transform: rotateY(360deg);
            }
        }
        /* Opsional: tombol kontrol */
        
        .controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
        }
        
        button {
            background: #222;
            color: #fff;
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
        }
        
        button:hover {
            background: #444;
        }
    </style>
</head>

<body>
    <div class="scene">
        <div class="cube" id="cube">
            <!-- Ganti URL di bawah ini dengan link langsung gambar kamu -->
            <img src="1.png" class="front" alt="Depan Tas">
            <img src="2.png" class="right" alt="Samping Tas">
            <img src="1.png" class="back" alt="Belakang Tas">
            <img src="2.png" class="left" alt="Kiri Tas">
        </div>
    </div>

    <div class="controls">
        <button onclick="toggleSpin()">Putar / Berhenti</button>
    </div>

    <script>
        let cube = document.getElementById('cube');
        let spinning = true;

        function toggleSpin() {
            spinning = !spinning;
            cube.style.animationPlayState = spinning ? 'running' : 'paused';
        }
    </script>
</body>

</html>
