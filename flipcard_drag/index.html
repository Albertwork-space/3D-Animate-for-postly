<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Travel Magazine 3D Flip (Glossy Lentur)</title>
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <style>
        body {
            margin: 0;
            background: #dfe7ec;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: "Segoe UI", sans-serif;
            overflow: hidden;
        }
        
        canvas {
            z-index: 10;
            /* <<< tambahkan baris ini */
            pointer-events: auto;
            /* <<< pastikan event mouse diterima */
        }
        
        .page {
            pointer-events: none;
            /* <<< halaman tidak memblokir drag */
        }
        
        .book {
            position: relative;
            width: 850px;
            height: 1200px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, .3);
            border-radius: 12px;
            overflow: hidden;
            background: #fff;
        }
        
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        .page-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .page-info {
            position: absolute;
            bottom: 0;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0.6), transparent);
            color: #fff;
            padding: 40px;
        }
        
        .page-info h1 {
            margin: 0;
            font-size: 36px;
            text-shadow: 0 3px 10px rgba(0, 0, 0, .7);
        }
        
        .page-info p {
            font-size: 18px;
            max-width: 70%;
            text-shadow: 0 2px 8px rgba(0, 0, 0, .6);
        }
    </style>
</head>

<body>
    <div class="book">
        <canvas id="pageCanvas" width="850" height="1200"></canvas>

        <!-- Halaman 1 -->
        <div class="page" data-index="0">
            <img class="page-img" src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=850&q=80">
            <div class="page-info">
                <h1>Santorini, Greece</h1>
                <p>Blue domes, golden sunsets, and endless Aegean skies.</p>
            </div>
        </div>

        <!-- Halaman 2 -->
        <div class="page" data-index="1">
            <img class="page-img" src="https://images.unsplash.com/photo-1526778548025-fa2f459cd5c1?auto=format&fit=crop&w=850&q=80">
            <div class="page-info">
                <h1>Bali, Indonesia</h1>
                <p>Temples, surf, and rice terraces shimmering in sunlight.</p>
            </div>
        </div>

        <!-- Halaman 3 -->
        <div class="page" data-index="2">
            <img class="page-img" src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=850&q=80">
            <div class="page-info">
                <h1>Kyoto, Japan</h1>
                <p>Cherry blossoms whisper through ancient streets.</p>
            </div>
        </div>

        <!-- Halaman 4 -->
        <div class="page" data-index="3">
            <img class="page-img" src="https://images.unsplash.com/photo-1518684079-3c830dcef090?auto=format&fit=crop&w=850&q=80">
            <div class="page-info">
                <h1>Paris, France</h1>
                <p>Lights of romance dancing along the Seine.</p>
            </div>
        </div>
    </div>

    <!-- Suara flip online -->
    <audio id="flipSound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_32a6dfb08d.mp3?filename=page-flip-110.mp3"></audio>

    <script>
        const canvas = document.getElementById('pageCanvas');
        const ctx = canvas.getContext('2d');
        const pages = [...document.querySelectorAll('.page')];
        const flipSound = document.getElementById('flipSound');

        let current = 0;
        let dragging = false;
        let dragX = canvas.width;
        let startX = dragX;
        let animating = false;

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const next = current + 1 < pages.length ? current + 1 : current;
            const backImg = pages[next].querySelector('.page-img');
            const frontImg = pages[current].querySelector('.page-img');

            // gambar halaman bawah
            ctx.drawImage(backImg, 0, 0, canvas.width, canvas.height);

            // posisi lipatan
            const foldX = Math.min(Math.max(dragX, 0), canvas.width);
            const foldWidth = canvas.width - foldX;
            const strength = 1 - Math.abs(canvas.width / 2 - foldX) / (canvas.width / 2);
            const bend = foldWidth * 0.3 * strength;

            ctx.save();

            // bentuk lipatan dengan kurva Bézier
            ctx.beginPath();
            ctx.moveTo(foldX, 0);
            ctx.bezierCurveTo(foldX + bend, canvas.height * 0.3, foldX + bend, canvas.height * 0.7, foldX, canvas.height);
            ctx.lineTo(canvas.width, canvas.height);
            ctx.lineTo(canvas.width, 0);
            ctx.closePath();
            ctx.clip();

            // gambar halaman terlipat
            ctx.drawImage(frontImg, 0, 0, canvas.width, canvas.height);

            // efek glossy
            const grad = ctx.createLinearGradient(foldX - 60, 0, foldX + 60, 0);
            grad.addColorStop(0, 'rgba(0,0,0,0.4)');
            grad.addColorStop(0.4, 'rgba(255,255,255,0.2)');
            grad.addColorStop(0.6, 'rgba(255,255,255,0.15)');
            grad.addColorStop(1, 'rgba(0,0,0,0.4)');
            ctx.fillStyle = grad;
            ctx.fillRect(foldX - 60, 0, 120, canvas.height);

            ctx.restore();

            // bayangan jatuh di sisi lipatan
            const shadow = ctx.createLinearGradient(foldX, 0, canvas.width, 0);
            shadow.addColorStop(0, 'rgba(0,0,0,' + (0.2 * strength) + ')');
            shadow.addColorStop(0.7, 'transparent');
            ctx.fillStyle = shadow;
            ctx.fillRect(foldX, 0, canvas.width - foldX, canvas.height);
        }

        function animateTo(target) {
            if (animating) return;
            animating = true;
            const start = dragX;
            const dist = target - start;
            const duration = 900;
            const startTime = performance.now();

            function anim(time) {
                const t = (time - startTime) / duration;
                if (t >= 1) {
                    dragX = target;
                    if (target <= 0 && current < pages.length - 1) {
                        current++;
                    }
                    if (target >= canvas.width && current > 0) {
                        current--;
                    }
                    animating = false;
                    draw();
                    return;
                }
                const ease = 0.5 - 0.5 * Math.cos(Math.PI * t);
                dragX = start + dist * ease;
                draw();
                requestAnimationFrame(anim);
            }
            requestAnimationFrame(anim);
        }

        canvas.addEventListener('mousedown', e => {
            dragging = true;
            startX = e.offsetX;
        });
        canvas.addEventListener('mousemove', e => {
            if (!dragging) return;
            dragX = e.offsetX;
            draw();
        });
        canvas.addEventListener('mouseup', () => {
            if (!dragging) return;
            dragging = false;
            flipSound.currentTime = 0;
            flipSound.play();
            if (dragX < canvas.width / 2) {
                animateTo(0);
            } else {
                animateTo(canvas.width);
            }
        });
        canvas.addEventListener('mouseleave', () => {
            if (dragging) {
                dragging = false;
                animateTo(canvas.width);
            }
        });

        draw();
    </script>
</body>

</html>
