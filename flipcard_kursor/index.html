<!DOCTYPE html>
<!-- Menentukan dokumen HTML5 -->
<html lang="id">
<!-- Bahasa dokumen adalah Bahasa Indonesia -->

<head>
    <meta charset="UTF-8">
    <!-- Set karakter encoding agar teks tampil benar -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Membuat tampilan responsif di perangkat mobile -->
    <title>Flip Card Bolak Balik (Potrait)</title>
    <!-- Judul halaman di tab browser -->
    <link rel="stylesheet" href="style.css">
    <!-- Menghubungkan file CSS eksternal -->
</head>

<body>

    <!-- Elemen utama kartu -->
    <div class="card">
        <!-- Bagian dalam kartu yang bisa berputar -->
        <div class="card-inner">
            <!-- Sisi depan kartu -->
            <div class="card-front">
                <h2>Halaman 1 (Depan)</h2>
                <p>Contoh tampilan depan kartu dalam posisi potret.</p>
            </div>
            <!-- Sisi belakang kartu -->
            <div class="card-back">
                <h2>Halaman 2 (Belakang)</h2>
                <p>Ini sisi belakang kartu.</p>
            </div>
        </div>
    </div>

</body>

</html>
